<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Form</title>
    </head>
    <body>
        <form>
            <label for="email"><b>Email:</b></label><br>
            <input type="email" name="email"><br>

            <label for="message"><b>Message:</b></label><br>
            <textarea name="multiline"></textarea><br>
        
            <label for="Status"><b>Current Status:</b></label><br>
            <input type="checkbox" name="p1" value="Project 1"> 
            <label for="p1">Project 1</label><br>
            <input type="checkbox" name="p2" value="Project 2"> 
            <label for="p2">Project 2</label><br>
            <input type="checkbox" name="p3" value="Project 3"> 
            <label for="p3">Project 3</label><br>

            <label for="Status"><b>No. of projects completed:</b></label><br>
            <div>
                <input type="radio" name="projects_completed" value="0"> 
                <label for="zero">0</label><br>
                <input type="radio" name="projects_completed" value="1"> 
                <label for="one">1</label><br>
                <input type="radio" name="projects_completed" value="2"> 
                <label for="two">2</label><br>
                <input type="radio" name="projects_completed" value="3"> 
                <label for="three">3</label><br>
            </div>

            <label for="current_project"><b>Current Project in Progress:</b></label><br>
            <select name="current_project">
                <option value="project1">Project 1</option>
                <option value="project2">Project 2</option>
                <option value="project3">Project 3</option>
            </select><br>

            <label for="password"><b>Password:</b></label><br>
            <input type="password" name="password"> <br>

            <input type="submit" value="Submit Form">
        </form>
    </body>
</html>
